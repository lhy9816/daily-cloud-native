sources:
  github:
    token: "${GITHUB_TOKEN}"
    keywords:
      - kubernetes
      - cloud-native
      - llm-inference
      - ai-agent
      - gpu-scheduling
      - volcano
      - kserve
      - vllm
      - karpenter
      - cilium
      - istio
      - envoy
    watch_repos: []
  arxiv:
    rss_url: "https://rss.arxiv.org/rss/cs.DC+cs.SE+cs.LG"
    hours: 72
  blogs:
    feeds:
      - "https://kubernetes.io/feed.xml"
      - "https://www.cncf.io/blog/feed/"
      - "https://istio.io/latest/blog/feed.xml"
      - "https://blog.crossplane.io/rss/"
      - "https://aws.amazon.com/blogs/containers/feed/"
      - "https://aws.amazon.com/blogs/machine-learning/feed/"
      - "https://huggingface.co/blog/feed.xml"
      - "https://thenewstack.io/feed/"
      - "https://www.hashicorp.com/blog/feed.xml"
      - "https://developer.nvidia.com/blog/feed/"
      - "https://github.blog/engineering/feed/"
      - "https://www.qikqiak.com/index.xml"
    hours: 72
  github_releases:
    repos:
      - "kubernetes/kubernetes"
      - "cilium/cilium"
      - "istio/istio"
      - "prometheus/prometheus"
      - "envoyproxy/envoy"
      - "kubernetes-sigs/karpenter"
      - "vllm-project/vllm"
      - "ray-project/ray"
      - "huggingface/transformers"
      - "kedacore/keda"
      - "open-policy-agent/gatekeeper"
    hours: 72

llm:
  provider: "openai"
  model: "glm-5"
  api_key: "${LLM_API_KEY}"
  base_url: "https://aiproxy.xin/cosphere/v1"
  batch_size: 6
  max_output_tokens: 2000

feishu:
  webhook_url: "${FEISHU_WEBHOOK_URL}"

github_archive:
  repo_path: "."
  content_dir: "content"
  remote: "origin"
  branch: "main"

schedule:
  timezone: "Asia/Shanghai"
  time: "08:00"
  timeout_minutes: 10
